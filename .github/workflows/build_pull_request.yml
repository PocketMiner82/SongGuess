name: Build app on PR
on:
 workflow_dispatch:
 pull_request:
  branches: [ dev ]


jobs:
 build:
  name: Build app
  runs-on: ubuntu-latest
  steps:
    - name: Checkout
      uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: "npm"
    - name: Install expect
      run: sudo apt install -y expect
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
    - name: Run Checks
      run: npm run check
    - name: Verify build and startup
      run: expect -c 'set timeout 15; spawn npm run dev; expect -re ".*Ready on.*http.*" { exit 0 }; exit 1'
